services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      CONTACT_API_DB_USER: ${CONTACT_API_DB_USER}
      CONTACT_API_DB_PASSWORD: ${CONTACT_API_DB_PASSWORD}
      CONTACT_API_DB_NAME: ${CONTACT_API_DB_NAME}
      OPENFGA_DB_USER: ${OPENFGA_DB_USER}
      OPENFGA_DB_PASSWORD: ${OPENFGA_DB_PASSWORD}
      OPENFGA_DB_NAME: ${OPENFGA_DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # 初回起動時に各データベースとユーザーを自動作成する初期化スクリプト
      - ./docker/init-contact-api-db.sh:/docker-entrypoint-initdb.d/01-init-contact-api-db.sh:ro
      - ./docker/init-openfga-db.sh:/docker-entrypoint-initdb.d/02-init-openfga-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  openfga-migrate:
    image: openfga/openfga
    command: migrate
    environment:
      OPENFGA_DATASTORE_ENGINE: postgres
      OPENFGA_DATASTORE_URI: "postgres://${OPENFGA_DB_USER}:${OPENFGA_DB_PASSWORD}@postgres:5432/${OPENFGA_DB_NAME}?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy

  openfga:
    image: openfga/openfga
    command: run
    environment:
      OPENFGA_DATASTORE_ENGINE: postgres
      OPENFGA_DATASTORE_URI: "postgres://${OPENFGA_DB_USER}:${OPENFGA_DB_PASSWORD}@postgres:5432/${OPENFGA_DB_NAME}?sslmode=disable"
      OPENFGA_PLAYGROUND_ENABLED: "true"
    ports:
      - "8080:8080"
      - "8081:8081"
      - "3001:3000"
    depends_on:
      openfga-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "/usr/local/bin/grpc_health_probe", "-addr=:8081"]
      interval: 5s
      timeout: 5s
      retries: 5

  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        user_id: ${USER_ID}
        group_id: ${GROUP_ID}
        TZ: ${TZ:-Asia/Tokyo}
    volumes:
      - .:/app
      - zsh-history:/zsh-volume
      - /run/host-services/ssh-auth.sock:/run/host-services/ssh-auth.sock
    environment:
      - SSH_AUTH_SOCK=/run/host-services/ssh-auth.sock
      - GH_TOKEN=${GH_TOKEN}
      - CONTACT_API_DB_HOST=postgres
      - CONTACT_API_DB_PORT=5432
      - CONTACT_API_DB_USER=${CONTACT_API_DB_USER}
      - CONTACT_API_DB_PASSWORD=${CONTACT_API_DB_PASSWORD}
      - CONTACT_API_DB_NAME=${CONTACT_API_DB_NAME}
      - OPENFGA_API_URL=http://openfga:8080
      - OPENFGA_STORE_ID=${OPENFGA_STORE_ID:-}
      - OPENFGA_AUTH_MODEL_ID=${OPENFGA_AUTH_MODEL_ID:-}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      openfga:
        condition: service_healthy
    profiles:
      - dev

  prod:
    build:
      context: .
      dockerfile: Dockerfile.prod
    environment:
      - CONTACT_API_DB_HOST=postgres
      - CONTACT_API_DB_PORT=5432
      - CONTACT_API_DB_USER=${CONTACT_API_DB_USER}
      - CONTACT_API_DB_PASSWORD=${CONTACT_API_DB_PASSWORD}
      - CONTACT_API_DB_NAME=${CONTACT_API_DB_NAME}
      - OPENFGA_API_URL=http://openfga:8080
      - OPENFGA_STORE_ID=${OPENFGA_STORE_ID:-}
      - OPENFGA_AUTH_MODEL_ID=${OPENFGA_AUTH_MODEL_ID:-}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      openfga:
        condition: service_healthy
    profiles:
      - prod

volumes:
  pgdata:
  zsh-history:
    name: contact-api-zsh-history
