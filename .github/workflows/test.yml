name: test
on:
  pull_request:
    branches: [main, develop]
  # develop では pull_request イベントのみでテストを実行する。
  # push も develop に含めると、同一コミットで push と pull_request が
  # 同時発火しテストが二重実行されてしまうため、push は main のみに限定する。
  push:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: contact_api_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      CONTACT_API_DB_HOST: localhost
      CONTACT_API_DB_PORT: 5432
      CONTACT_API_DB_USER: postgres
      CONTACT_API_DB_PASSWORD: postgres
      CONTACT_API_DB_NAME: contact_api_test
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npm test
